default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: postgres
  password: password
  host: 127.0.0.1
  port: 5432
  sslmode: disable


development:
  <<: *default
  database: com214_web_development_development

test:
  <<: *default
  database: com214_web_development_test

production:
  <<: *default
  database: com214_web_development_production
  password: <%= ENV["DATABASE_PASSWORD"] %>